  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 15px;
      background: #f7f7f7;
    }

    h2 {
      margin-bottom: 16px;
    }

    .toolbar {
      margin-bottom: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .toolbar select,
    .toolbar input,
    .toolbar button {
      font-size: 16px;
      padding: 6px 10px;
    }

    #summary {
      margin: 10px 0 18px;
      line-height: 1.6;
      font-size: 18px;
      font-weight: bold;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ddd;
    }

    .checked {
      background: #eee;
    }

    .offer {
      background: #c8f7c5;
    }

    .backup {
      background: #ffeeba;
    }

    .name {
      font-weight: bold;
      font-size: 16px;
      margin-bottom: 4px;
    }

    .info {
      font-size: 13px;
      color: #555;
      margin: 2px 0;
    }

    .phone {
      color: #007bff;
      text-decoration: underline;
      cursor: pointer;
    }

    .actions {
      margin-top: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .actions select {
      padding: 4px 6px;
    }
  </style>
</head>
<body>

  <h2>📋 2026/6/13招募報到系統</h2>

  <div class="toolbar">
    <select id="sessionFilter">
      <option value="all">全部</option>
      <option value="9:00">9:00</option>
      <option value="10:00">10:00</option>
      <option value="11:00">11:00</option>
      <option value="13:00">13:00</option>
      <option value="14:00">14:00</option>
      <option value="15:00">15:00</option>
    </select>

    <input id="searchBox" placeholder="🔍 搜尋姓名">

    <label>
      <input type="checkbox" id="notArrived">
      只看未報到
    </label>

    <button onclick="exportCSV()">📥 匯出 Excel</button>
  </div>

  <h3 id="summary"></h3>
  <div id="list"></div>

      {n:"郭洹瑜",t:"14:00",i:"Johnson Kuo & Andy Hsueh",l:"CY",team:"Etch",r:"809",p:"0971799795"},

      {n:"游承瑜",t:"15:00",i:"Ben Tsai & Kelvin Wang",l:"TC",team:"ECP/CVD",r:"Cubicle",p:"0963769975"},
      {n:"張煒祥",t:"15:00",i:"Godspeed Lin & Rick Huang",l:"TC",team:"CVD",r:"812",p:"0979229292"},
      {n:"許恒嘉",t:"15:00",i:"Eric Chen & Ethan Pan",l:"CY",team:"CVD",r:"810",p:"0988057879"},
      {n:"林良晏",t:"15:00",i:"Yoyo Yeh & Scott Wu",l:"CY",team:"ECP",r:"811",p:"0922588845"},
      {n:"黃于恆",t:"15:00",i:"I-Fan & Roger Hu",l:"TC",team:"ECP",r:"808",p:"0916739855"},
      {n:"楊洸榮 (CY)",t:"15:00",i:"Jack Wang & Dean Cheng",l:"TC",team:"Clean",r:"813",p:"0932582148"}
    ];

    db.ref("checkin").on("value", snap => {
      data = snap.val() || {};
      render();
    });

    function render() {
      let total = 0;
      let arr = 0;
      let off = 0;
      let hr = 0;

      let sessionStats = {
        "9:00": 0,
        "10:00": 0,
        "11:00": 0,
        "13:00": 0,
        "14:00": 0,
        "15:00": 0
      };

      list.innerHTML = "";

      candidates.forEach(c => {
        const s = data[c.n] || {};

        if (sessionFilter.value !== "all" && c.t !== sessionFilter.value) return;
        if (searchBox.value && !c.n.includes(searchBox.value.trim())) return;
        if (notArrived.checked && s.checked) return;

        total++;

        if (s.checked) {
          arr++;
          sessionStats[c.t]++;
        }

        if (s.offer) off++;
        if (s.hr) hr++;

        const div = document.createElement("div");
        div.className = "card";

        if (c.i === "Backup") div.classList.add("backup");
        if (s.checked) div.classList.add("checked");
        if (s.offer) div.classList.add("offer");

        div.innerHTML = `
          <div class="name">${c.n} (${c.t})</div>
          <div class="info">👨‍💼 ${c.i}</div>
          <div class="info">📍 ${c.l} / ${c.team || "-"} / ${c.r || "-"}</div>
          <div class="info">📞 <a class="phone" href="tel:${c.p}">${formatPhone(c.p)}</a></div>

          <div class="actions">
            <label>
              ✅ Arrive
              <input type="checkbox" ${s.checked ? "checked" : ""}
                onchange="update('${escapeName(c.n)}','checked',this.checked)">
            </label>

            <label>
              ⭐ Offer
              <input type="checkbox" ${s.offer ? "checked" : ""}
                onchange="update('${escapeName(c.n)}','offer',this.checked)">
            </label>

            <select onchange="update('${escapeName(c.n)}','hr',this.value)">
              <option value="">HR</option>
              ${hrList.map(h => `<option value="${h}" ${s.hr === h ? "selected" : ""}>${h}</option>`).join("")}
            </select>
          </div>
        `;

        list.appendChild(div);
      });

      const sessionText = Object.entries(sessionStats)
        .map(([t, v]) => `${t}: ${v}`)
        .join(" ｜ ");

      summary.innerText =
        `Arrive ${arr}/${total} ｜ Offer ${off} ｜ HR ${hr}\n📊 各場次: ${sessionText}`;
    }

    function formatPhone(p) {
      if (!p) return "";
      return p.replace(/(\d{4})(\d{3})(\d{3})/, "$1-$2-$3");
    }

    function escapeName(name) {
      return name.replace(/'/g, "\\'");
    }

    function update(n, f, v) {
      const payload = {};
      payload[f] = v || null;
      db.ref("checkin/" + n).update(payload);
    }

    function exportCSV() {
      const rows = [["Name", "Session", "Interviewer", "Location", "Team", "Room", "Phone", "Arrive", "Offer", "HR"]];
      candidates.forEach(c => {
        const s = data[c.n] || {};
        rows.push([
          c.n,
          c.t,
          c.i,
          c.l,
          c.team,
          c.r,
          formatPhone(c.p),
          s.checked ? "Yes" : "No",
          s.offer ? "Yes" : "No",
          s.hr || ""
        ]);
      });

      const csv = "\uFEFF" + rows.map(r =>
        r.map(field => `"${String(field ?? "").replace(/"/g, '""')}"`).join(",")
      ).join("\n");

      const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "recruit.csv";
      a.click();
    }

    sessionFilter.onchange = render;
    searchBox.onkeyup = render;
    notArrived.onchange = render;
  </script>
</body>
</html>

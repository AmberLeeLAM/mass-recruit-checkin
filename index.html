<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recruit System</title>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<style>
body { font-family: Arial; padding:15px; background:#f7f7f7; }

.card {
  background:white;
  border-radius:10px;
  padding:12px;
  margin:10px 0;
  border:1px solid #ddd;
}

.checked { background:#eee; }
.offer { background:#c8f7c5; }
.hrDone { background:#8be28b; }
.noHR { border:2px solid red; }
.backup { background:#ffeeba; }

.name { font-weight:bold; font-size:16px; }
.info { font-size:13px; color:#555; }

.toolbar { margin-bottom:10px; }
</style>
</head>

<body>

<h2>📋 招募報到系統</h2>

<div class="toolbar">
<select id="sessionFilter">
<option value="all">全部</option>
<option>9:00</option><option>10:00</option><option>11:00</option>
<option>13:00</option><option>14:00</option><option>15:00</option>
</select>

<input id="searchBox" placeholder="🔍 搜尋姓名">

<label><input type="checkbox" id="notArrived"> 只看未報到</label>
<label><input type="checkbox" id="groupHR"> 按 HR 分組</label>

<button onclick="exportCSV()">📥 匯出 Excel</button>
</div>

<h3 id="summary"></h3>
<div id="list"></div>

<script>

firebase.initializeApp({
  databaseURL: "https://mass-recruit-event-default-rtdb.asia-southeast1.firebasedatabase.app/"
});
const db = firebase.database();

// ✅ HR 更新
const hrList = ["Chloe","Amber","Aimee"];

const sessionFilter = document.getElementById("sessionFilter");
const searchBox = document.getElementById("searchBox");
const list = document.getElementById("list");
const summary = document.getElementById("summary");
const notArrived = document.getElementById("notArrived");
const groupHR = document.getElementById("groupHR");

let data = {};

// ✅ Firebase
db.ref("checkin").on("value", snap=>{
  data = snap.val() || {};
  render();
});

// ✅ Candidate (same as yours — shortened here for space)
const candidates = [
{n:"李佳修",t:"9:00",i:"Dino Wang & Jeff Yang",l:"CY",team:"Etch",r:"Cubicle"},
{n:"許哲瑋",t:"9:00",i:"Johnson Kuo & Andy Hsueh",l:"CY",team:"Etch",r:"809"},
{n:"王懷緯",t:"9:00",i:"Ben Tsai & Kelvin Wang",l:"TC",team:"ECP/CVD",r:"Cubicle"},
{n:"李育霖",t:"9:00",i:"Godspeed Lin & Rick Huang",l:"TC",team:"CVD",r:"812"},
{n:"黃冠維",t:"9:00",i:"Eric Chen & Ethan Pan",l:"CY",team:"CVD",r:"810"},
{n:"李俊德",t:"9:00",i:"Backup",l:"TC",team:"",r:""}
];

// ✅ render
function render(){

  let filter = sessionFilter.value;
  let search = searchBox.value.trim();

  let total=0, checked=0, offer=0, hr=0;
  let hrGroup = {};

  list.innerHTML="";

  candidates.forEach(c=>{
    let s = data[c.n] || {};

    if(filter!="all" && c.t!=filter) return;
    if(search && !c.n.includes(search)) return;
    if(notArrived.checked && s.checked) return;

    total++;
    if(s.checked) checked++;
    if(s.offer) offer++;
    if(s.hr) hr++;

    // ✅ Group HR
    let groupKey = s.hr || "未分配";
    if(!hrGroup[groupKey]) hrGroup[groupKey] = [];
    hrGroup[groupKey].push({c,s});
  });

  // ✅ render grouped or normal
  Object.keys(hrGroup).forEach(group=>{
    if(groupHR.checked){
      let title = document.createElement("h4");
      title.innerText = "👤 " + group;
      list.appendChild(title);
    }

    hrGroup[group].forEach(({c,s})=>{
      let div=document.createElement("div");
      div.className="card";

      if(c.i==="Backup") div.classList.add("backup");
      if(s.checked) div.classList.add("checked");
      if(s.offer) div.classList.add("offer");
      if(s.hr) div.classList.add("hrDone");
      if(!s.hr) div.classList.add("noHR");

      div.innerHTML=`
      <div class='name'>${c.n} (${c.t})</div>
      <div class='info'>👨‍💼 ${c.i}</div>
      <div class='info'>📍 ${c.l} / ${c.team} / ${c.r}</div>

      ✅ Arrive <input type="checkbox" ${s.checked?"checked":""}
      onchange="update('${c.n}','checked',this.checked)">

      ⭐ Offer <input type="checkbox" ${s.offer?"checked":""}
      onchange="update('${c.n}','offer',this.checked)">

      <select onchange="update('${c.n}','hr',this.value)">
      <option value="">HR</option>
      ${hrList.map(h=>`<option ${s.hr===h?"selected":""}>${h}</option>`).join("")}
      </select>
      `;

      list.appendChild(div);
    });
  });

  summary.innerText = `Arrive ${checked}/${total} ｜ Offer ${offer} ｜ HR ${hr}`;
}

// ✅ update
function update(n,f,v){
  let p={}; p[f]=v||null;
  db.ref("checkin/"+n).update(p);
}

// ✅ export CSV (Excel)
function exportCSV(){
  let rows = [["Name","Session","Arrived","Offer","HR"]];

  candidates.forEach(c=>{
    let s = data[c.n] || {};
    rows.push([
      c.n,
      c.t,
      s.checked ? "Yes" : "No",
      s.offer ? "Yes" : "No",
      s.hr || ""
    ]);
  });

  let csv = rows.map(r=>r.join(",")).join("\n");

  let blob = new Blob([csv], {type:"text/csv"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "recruit.csv";
  a.click();
}

// ✅ events
sessionFilter.onchange = render;
searchBox.onkeyup = render;
notArrived.onchange = render;
groupHR.onchange = render;

</script>

</body>
</html>

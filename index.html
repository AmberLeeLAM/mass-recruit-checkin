// ✅ Firebase live
db.ref("checkin").on("value", snap => {
  data = snap.val() || {};
  render();
});

// ✅ Render
function render(){
let filter=sessionFilter.value;
let search=searchBox.value.trim();

let total=0,checked=0,offer=0,hr=0;

list.innerHTML="";

candidates.forEach(c=>{
if(filter!="all" && c.t!=filter) return;
if(search && !c.n.includes(search)) return;

total++;

let s=data[c.n]||{};
if(s.checked) checked++;
if(s.offer) offer++;
if(s.hr) hr++;

let div=document.createElement("div");
div.className="card";

if(c.i==="Backup") div.classList.add("backup");
if(s.checked) div.classList.add("checked");
if(s.offer) div.classList.add("offer");
if(s.hr) div.classList.add("hrDone");

div.innerHTML=`
<div class='name'>${c.n} (${c.t})</div>
<div class='info'>👨‍💼 ${c.i}</div>
<div class='info'>📍 ${c.l} / ${c.team} / ${c.r}</div>

✅ <input type="checkbox" ${s.checked?"checked":""} onchange="update('${c.n}','checked',this.checked)">
⭐ <input type="checkbox" ${s.offer?"checked":""} onchange="update('${c.n}','offer',this.checked)">

<select onchange="update('${c.n}','hr',this.value)">
<option value="">HR</option>
${hrList.map(h=>`<option ${s.hr===h?"selected":""}>${h}</option>`).join("")}
</select>
`;

list.appendChild(div);
});

summary.innerText=`報到 ${checked}/${total} ｜ Offer ${offer} ｜ HR ${hr}`;
}

// ✅ Update
function update(n,f,v){
let p={}; p[f]=v || null;
db.ref("checkin/"+n).update(p);
}

// ✅ Events
sessionFilter.onchange=render;
searchBox.onkeyup=render;

</script>

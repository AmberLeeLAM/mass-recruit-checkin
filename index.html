<!DOCTYPE html>
<html lang="zh-TW">

<head>
<meta charset="UTF-8">
<title>2026/6/13招募報到系統</title>

<meta http-equiv="cache-control" content="no-cache">
<meta http-equiv="expires" content="0">
<meta http-equiv="pragma" content="no-cache">

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<style>
body { font-family: Arial; padding:15px; background:#f7f7f7; }

.card {
  background:white;
  border-radius:10px;
  padding:12px;
  margin:10px 0;
  border:1px solid #ddd;
}

.checked { background:#eee; }
.offer { background:#c8f7c5; }
.backup { background:#ffeeba; }

.name { font-weight:bold; font-size:16px; }
.info { font-size:13px; color:#555; margin:2px 0; }

.phone {
  color:#007bff;
  text-decoration:underline;
}

.toolbar { margin-bottom:10px; }
</style>
</head>

<body>

<h2>📋 2026/6/13招募報到系統</h2>

<div class="toolbar">
<select id="sessionFilter">
<option value="all">全部</option>
<option>9:00</option><option>10:00</option><option>11:00</option>
<option>13:00</option><option>14:00</option><option>15:00</option>
</select>

<input id="searchBox" placeholder="🔍 搜尋姓名">

<label><input type="checkbox" id="notArrived"> 只看未報到</label>

<button onclick="exportCSV()">📥 匯出 Excel</button>
</div>

<!-- ✅ 你要的統計區 -->
<h3 id="summary"></h3>

<div id="list"></div>

<script>
// Firebase
firebase.initializeApp({
  databaseURL: "https://mass-recruit-event-default-rtdb.asia-southeast1.firebasedatabase.app/"
});
const db = firebase.database();

// DOM
const sessionFilter = document.getElementById("sessionFilter");
const searchBox = document.getElementById("searchBox");
const notArrived = document.getElementById("notArrived");
const list = document.getElementById("list");
const summary = document.getElementById("summary");

// HR
const hrList = ["Chloe","Amber","Aimee"];

let data = {};

// ✅ candidates（你完整名單）
const candidates = [
{n:"李佳修",t:"9:00",i:"Dino Wang & Jeff Yang",l:"CY",team:"Etch",r:"Cubicle",p:"0982966791"},
{n:"謝承佑",t:"9:00",i:"Johnson Kuo & Andy Hsueh",l:"CY",team:"Etch",r:"809",p:"0921590355"},
{n:"王懷緯",t:"9:00",i:"Ben Tsai & Kelvin Wang",l:"TC",team:"ECP/CVD",r:"Cubicle",p:"0977449463"},
{n:"林俊呈",t:"9:00",i:"Godspeed Lin & Rick Huang",l:"TC",team:"CVD",r:"812",p:"0987427015"},
{n:"黃冠維",t:"9:00",i:"Eric Chen & Ethan Pan",l:"CY",team:"CVD",r:"810",p:"0976308221"},
{n:"楊博丞",t:"9:00",i:"Yoyo Yeh & Scott Wu",l:"CY",team:"ECP",r:"811",p:"0983777941"},
{n:"邱俊評",t:"9:00",i:"I-Fan & Roger Hu",l:"TC",team:"ECP",r:"808",p:"0906607890"},
{n:"林孟儒",t:"9:00",i:"Jack Wang & Dean Cheng",l:"TC",team:"Clean",r:"813",p:"0917420629"},
{n:"王弘毅",t:"9:00",i:"Backup",l:"CY",team:"",r:"",p:"0932592605"},

{n:"蔡武丞",t:"10:00",i:"Dino Wang & Jeff Yang",l:"CY",team:"Etch",r:"Cubicle",p:"0970820922"},
{n:"朱柏勝",t:"10:00",i:"Johnson Kuo & Andy Hsueh",l:"CY",team:"Etch",r:"809",p:"0965102027"},
{n:"吳念謙",t:"10:00",i:"Ben Tsai & Kelvin Wang",l:"TC",team:"ECP/CVD",r:"Cubicle",p:"0972083996"},
{n:"王吉斌",t:"10:00",i:"Godspeed Lin & Rick Huang",l:"TC",team:"CVD",r:"812",p:"0920411553"},
{n:"林羿廷",t:"10:00",i:"Eric Chen & Ethan Pan",l:"CY",team:"CVD",r:"810",p:"0919102661"},
{n:"白祐維",t:"10:00",i:"Yoyo Yeh & Scott Wu",l:"CY",team:"ECP",r:"811",p:"0909390208"},
{n:"陳志鈞",t:"10:00",i:"I-Fan & Roger Hu",l:"TC",team:"ECP",r:"808",p:"0921179951"},
{n:"黃泊泰",t:"10:00",i:"Jack Wang & Dean Cheng",l:"TC",team:"Clean",r:"813",p:"0978651728"},
{n:"劉致賢",t:"10:00",i:"Backup",l:"CY",team:"",r:"",p:"0905057771"}

];

// Firebase listen
db.ref("checkin").on("value", snap=>{
data = snap.val() || {};
render();
});

// ✅ render（含統計）
function render(){

let total=0, arr=0, off=0, hr=0;

let sessionStats={
"9:00":0,"10:00":0,"11:00":0,
"13:00":0,"14:00":0,"15:00":0
};

list.innerHTML="";

candidates.forEach(c=>{
let s=data[c.n]||{};

// filter
if(sessionFilter.value!=="all" && c.t!=sessionFilter.value) return;
if(searchBox.value && !c.n.includes(searchBox.value)) return;
if(notArrived.checked && s.checked) return;

total++;

if(s.checked){
arr++;
sessionStats[c.t]++;
}

if(s.offer) off++;
if(s.hr) hr++;

let div=document.createElement("div");
div.className="card";

if(c.i==="Backup") div.classList.add("backup");
if(s.checked) div.classList.add("checked");
if(s.offer) div.classList.add("offer");

div.innerHTML=`
<div class='name'>${c.n} (${c.t})</div>
<div class='info'>👨‍💼 ${c.i}</div>
<div class='info'>📍 ${c.l} / ${c.team} / ${c.r}</div>
<div class='info'>📞 <a class='phone' href="tel:${c.p}">${formatPhone(c.p)}</a></div>

✅ Arrive <input type="checkbox" ${s.checked?"checked":""}
onchange="update('${c.n}','checked',this.checked)">

⭐ Offer <input type="checkbox" ${s.offer?"checked":""}
onchange="update('${c.n}','offer',this.checked)">

<select onchange="update('${c.n}','hr',this.value)">
<option value="">HR</option>
${hrList.map(h=>`<option ${s.hr===h?"selected":""}>${h}</option>`).join("")}
</select>
`;

list.appendChild(div);
});

// ✅ 統計區（你要保留）
let sessionText = Object.entries(sessionStats)
.map(([t,v]) => `${t}: ${v}`).join(" ｜ ");

summary.innerText =
`Arrive ${arr}/${total} ｜ Offer ${off} ｜ HR ${hr}
📊 各場次: ${sessionText}`;
}

function formatPhone(p){
return p.replace(/(\d{4})(\d{3})(\d{3})/, "$1-$2-$3");
}

function update(n,f,v){
let p={}; p[f]=v||null;
db.ref("checkin/"+n).update(p);
}

function exportCSV(){
let rows=[["Name","Session","Phone","Arrive","Offer","HR"]];
candidates.forEach(c=>{
let s=data[c.n]||{};
rows.push([c.n,c.t,c.p,s.checked?"Yes":"No",s.offer?"Yes":"No",s.hr||""]);
});
let csv=rows.map(r=>r.join(",")).join("\n");
let blob=new Blob([csv]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="recruit.csv";
a.click();
}

// events
sessionFilter.onchange=render;
searchBox.onkeyup=render;
notArrived.onchange=render;

</script>

</body>
</html>
